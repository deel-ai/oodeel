name: pytest [tensorflow]

on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: "0 2 * * 0" # Run tests every Sunday at 2am

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        include:
          - python-version: "3.9"
            tf-version: 2.11
          - python-version: "3.10"
            tf-version: 2.13
          - python-version: "3.11"
            tf-version: 2.15

    steps:
    - uses: actions/checkout@v3
    - name: Install dependencies
      shell: bash -el {0}
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade uv tox tox-uv
    - name: Test with tox (Python ${{ matrix.python-version }} - TensorFlow ${{ matrix.tf-version }})
      shell: bash -el {0}
      run: |
        python -m tox -e py$(echo ${{ matrix.python-version }}-tf${{ matrix.tf-version }} | tr -d .)
